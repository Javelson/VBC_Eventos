<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - FortiGate Experience</title>
  <link rel="icon" type="image/svg+xml" href="/public/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="../admin-style.css" />
</head>
<body>
  <div class="admin-layout">
    <!-- Top Bar -->
    <header class="admin-topbar">
      <a href="../index.html" class="admin-topbar-brand">
        <img src="../public/logotipo/vbc.logo.jpeg" alt="VB Conexao" class="admin-topbar-logo site-logo" />
        <span class="admin-topbar-title">Painel Admin</span>
      </a>
      <div class="admin-topbar-user">
        <span class="admin-topbar-email" id="user-email"></span>
        <button class="btn-logout" id="btn-logout">Sair</button>
      </div>
    </header>

    <!-- Nav Menu -->
    <nav class="admin-nav">
      <a href="index.html" class="admin-nav-link active">Dashboard</a>
      <a href="events.html" class="admin-nav-link">Eventos</a>
      <a href="page.html" class="admin-nav-link">Pagina</a>
    </nav>

    <!-- Content -->
    <main class="admin-content">
      <!-- Flyer Manager -->
      <div class="flyer-manager">
        <div class="flyer-manager-title">Flyer Promocional</div>
        <div id="flyer-area">
          <div class="flyer-upload-area" id="flyer-upload">
            <div class="flyer-upload-text">Arrasta uma imagem ou clica para carregar</div>
            <input type="file" id="flyer-input" accept="image/*" style="display:none" />
            <button class="btn-action btn-edit" id="btn-flyer-select">Selecionar Ficheiro</button>
          </div>
          <div class="flyer-preview hidden" id="flyer-preview">
            <img id="flyer-img" src="" alt="Flyer" />
            <div style="margin-top:0.75rem;display:flex;gap:0.5rem;justify-content:center">
              <button class="btn-action btn-edit" id="btn-flyer-replace">Substituir</button>
              <button class="btn-action btn-delete" id="btn-flyer-remove">Remover</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Total</div>
          <div class="stat-value" id="stat-total">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Pendentes</div>
          <div class="stat-value pending" id="stat-pending">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Confirmados</div>
          <div class="stat-value confirmed" id="stat-confirmed">0</div>
        </div>
      </div>

      <!-- Subscribers Table -->
      <div class="table-container">
        <div class="table-header">
          <div class="table-title">Inscritos</div>
          <button class="btn-action btn-edit" id="btn-refresh">Atualizar</button>
        </div>
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th>Nome</th>
                <th>E-mail</th>
                <th>Telefone</th>
                <th>Status</th>
                <th>Data</th>
                <th>Acoes</th>
              </tr>
            </thead>
            <tbody id="subscribers-body">
              <tr><td colspan="6" class="empty-state"><div class="empty-state-icon">&#128203;</div><div>A carregar...</div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay hidden" id="edit-modal">
    <div class="modal">
      <div class="modal-title">Editar Inscrito</div>
      <form id="edit-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="edit-nome">Nome</label>
          <input type="text" id="edit-nome" class="form-input" />
        </div>
        <div class="form-group">
          <label class="form-label" for="edit-email">E-mail</label>
          <input type="email" id="edit-email" class="form-input" />
        </div>
        <div class="form-group">
          <label class="form-label" for="edit-telefone">Telefone</label>
          <input type="tel" id="edit-telefone" class="form-input" />
        </div>
        <div class="error-text" id="edit-error"></div>
        <div class="modal-actions">
          <button type="button" class="btn-cancel" id="edit-cancel">Cancelar</button>
          <button type="submit" class="btn-primary" id="edit-save" style="padding:0.5rem 1rem;font-size:0.875rem">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Delete Modal -->
  <div class="modal-overlay hidden" id="delete-modal">
    <div class="modal">
      <div class="modal-title">Eliminar Inscrito</div>
      <p style="color:#6b7280;margin-bottom:0.5rem">Tem certeza que deseja eliminar este inscrito?</p>
      <p style="font-weight:600;color:var(--foreground)" id="delete-name"></p>
      <div class="modal-actions">
        <button class="btn-cancel" id="delete-cancel">Cancelar</button>
        <button class="btn-danger" id="delete-confirm">Eliminar</button>
      </div>
    </div>
  </div>

  <script type="module" src="../admin-script.js"></script>
  <script type="module" src="../site-settings.js"></script>
</body>
</html>
